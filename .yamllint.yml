---
rules:
  braces:
    max-spaces-inside: 1
  brackets:
    max-spaces-inside: 1
  colons: enable
  commas: enable
  comments: enable
  document-end: disable
  document-start: enable
  empty-lines: enable
  empty-values: disable
  hyphens: enable
  indentation: enable
  key-duplicates: enable
  line-length:
    max: 120
    level: warning
  new-line-at-end-of-file: enable
  new-lines: enable
  octal-values: disable
  trailing-spaces: enable
  truthy:
    level: warning
